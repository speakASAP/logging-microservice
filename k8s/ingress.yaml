apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: logging-microservice
  namespace: statex-apps
  labels:
    app: logging-microservice
    managed-by: k8s-migration
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - logging.alfares.cz
      secretName: logging-microservice-tls
  rules:
    - host: logging.alfares.cz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: logging-microservice
                port:
                  number: 3367
