apiVersion: v1
kind: ConfigMap
metadata:
  name: logging-microservice-config
  namespace: statex-apps
  labels:
    app: logging-microservice
    managed-by: k8s-migration
data:
  NODE_ENV: "production"
  SERVICE_NAME: "logging-microservice"
  DOMAIN: "logging.alfares.cz"
  PORT: "3367"
  FRONTEND_PORT: "3378"
  CORS_ORIGIN: "*"
  LOG_LEVEL: "info"
  LOG_STORAGE_PATH: "./logs"
  LOG_ROTATION_MAX_SIZE: "100m"
  LOG_ROTATION_MAX_FILES: "10"
  LOG_TIMESTAMP_FORMAT: "YYYY-MM-DD HH:mm:ss"
  NGINX_NETWORK_NAME: "nginx-network"
  DOCKER_VOLUME_BASE_PATH: "./logs"
  PROJECT_BASE_PATH: "/home/ssf/Documents/Github/"
  # Service URLs - using host.k3s.internal during transition (auth, payments still on Docker)
  # These will be updated to K8s DNS as services migrate
  AUTH_SERVICE_URL: "http://host.k3s.internal:3370"
  PAYMENT_SERVICE_URL: "http://host.k3s.internal:3468"
  PAYMENT_CALLBACK_URL: "https://logging.alfares.cz/api/webhooks/payment-result"
  PAYMENT_SUCCESS_URL: "https://logging.alfares.cz/payment-result?status=completed"
  PAYMENT_CANCEL_URL: "https://logging.alfares.cz/payment-result?status=cancelled"
